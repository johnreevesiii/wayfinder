name: Monthly Facility Data Refresh

on:
  schedule:
    # Run on the 1st of every month at 6 AM UTC
    - cron: '0 6 1 * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pandas requests openpyxl

      - name: Run facility refresh
        run: python scripts/refresh-facilities.py

      - name: Check for changes
        id: changes
        run: |
          git diff --stat src/data/facilities.json
          echo "changed=$(git diff --name-only src/data/facilities.json | wc -l)" >> $GITHUB_OUTPUT

      - name: Create Pull Request
        if: steps.changes.outputs.changed != '0'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "Monthly facility data refresh from IHS directory"
          title: "Monthly Facility Data Refresh"
          body: |
            Automated monthly refresh from the IHS Official Facility Directory.

            Source: https://www.ihs.gov/sites/ihsoffices/themes/responsive2017/display_objects/documents/ihs_facilities.xlsx

            Please review the changes before merging:
            - New facilities added
            - Coordinates/phone numbers updated
            - Any facilities removed from IHS directory
          branch: facility-refresh
          delete-branch: true
